name: Build and deploy Container App

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
      ACR_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
      IMAGE_REPOSITORY: ${{ secrets.AZURE_CONTAINER_IMAGE_NAME }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image from src folder
        working-directory: src
        run: |
          IMAGE_NAME="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG"
          docker build -f Dockerfile -t "$IMAGE_NAME" .
          docker push "$IMAGE_NAME"

      - name: Deploy image to Azure Container App
        run: |
          IMAGE_NAME="$ACR_LOGIN_SERVER/$IMAGE_REPOSITORY:$IMAGE_TAG"
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_NAME" \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt_endpoint="${{ secrets.GPT_ENDPOINT }}" \
              embedding_endpoint="${{ secrets.EMBEDDING_ENDPOINT }}" \
              phi_4_endpoint="${{ secrets.PHI_4_ENDPOINT }}"